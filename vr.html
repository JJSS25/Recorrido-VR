<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="utf-8">
<title>Recorrido VR</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-look-at-component@1.0.0/dist/aframe-look-at-component.min.js"></script>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<a-scene renderer="antialias:true"
         vr-mode-ui="enabled: true"
         webxr="requiredFeatures: local-floor; optionalFeatures: hit-test">

<a-assets timeout="10000">

<!-- PASILLOS -->
<img id="pasillo1" src="images/Puerta.jpg">
<img id="pasillo2" src="images/Pasillo1.jpg">

<!-- AULAS -->
<img id="aula1" src="images/3D.jpg">
<img id="aula2" src="images/Robo.jpg">
<img id="aula3" src="images/SMT.jpg">
<img id="aula4" src="images/Manuf.jpg">
<img id="aula5" src="images/Roco.jpg">

<!-- ICONOS -->
<img id="icon3D" src="icons/3D.png">
<img id="iconRobo" src="icons/Robo.png">
<img id="iconSMT" src="icons/SMT.png">
<img id="iconManu" src="icons/Manu.png">
<img id="iconRoco" src="icons/Roco.png">

<!-- SONIDO -->
<audio id="clickSound" src="sounds/click.mp3"></audio>

</a-assets>

<!-- ENTIDAD DE SONIDO -->
<a-entity id="clickSoundEntity"
          sound="src: #clickSound; volume: 1; positional: false">
</a-entity>

<!-- SKY -->
<a-sky id="sky" src="#pasillo1" material="shader:flat;opacity:1"></a-sky>

<!-- HOTSPOTS -->
<a-entity id="hotspots"></a-entity>

<!-- CÁMARA -->
<a-entity camera look-controls position="0 1.6 0">

<a-entity
cursor="rayOrigin:entity; fuse:true; fuseTimeout:1000"
raycaster="objects:.clickable"
position="0 0 -1"
geometry="primitive:ring;radiusInner:0.01;radiusOuter:0.02"
material="color:white;shader:flat">
</a-entity>

</a-entity>

<!-- CONTROLES VR -->
<a-entity laser-controls="hand:right" raycaster="objects:.clickable"></a-entity>
<a-entity laser-controls="hand:left" raycaster="objects:.clickable"></a-entity>

</a-scene>

<script src="script.js"></script>

</body>
</html>
